cv:
  name: Saroj Chand
  label: Quantum Information Scientist
  email: schand@berkeley.edu
  location: Buffalo, NY
  image: ""
  summary: >
    Experimental quantum information scientist working on solid-state spin qubits and quantum
    sensing (NV centers, hBN VB− and related defects), coherent spin control, quantum noise
    spectroscopy, and 2D quantum materials. Incoming Assistant Professor and Simons Foundation
    Professor, Department of Electrical & Computer Engineering, University at Buffalo (SUNY).

