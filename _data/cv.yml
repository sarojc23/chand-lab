    Research Experience:
      - company: University of California, Berkeley
        position: Postdoctoral Scholar
        location: Berkeley, CA
        start_date: 2023-11
        end_date: present
        highlights:
          - Built a multiplexed wide-field NV microscope with 100+ individually resolved single-defect control and readout for scalable magnetometry (featured in Phys. Rev. X 15, 031015 (2025)).
          - Deployed ODMR, dynamical decoupling, and state tomography in high-throughput workflows, improving sensitivity and reproducibility.
          - Engineered optical (SLM/AOD/EMCCD, cryo) and microwave chains with automation and feedback to stabilize alignment and boost throughput.
          - Mentored undergraduate and graduate researchers; coordinated photonics–electronics–cryo builds.

      - company: Advanced Science Research Center, CUNY
        position: Graduate Research Assistant
        location: New York, NY
        start_date: 2018-08
        end_date: 2023-10
        highlights:
          - Studied exciton dynamics and quantum emitters in TMDs and hBN; identified emergent excitonic states in phase-engineered 1H/1T monolayers.
          - Led development of a cryogenic confocal single-photon microscope (APDs/HBT + spectrometers) for low-temperature PL/absorption (4-300 K).
          - Designed and fabricated plasmonic/dielectric nanostructures (e-beam lithography, etch, ALD) with automated high-throughput optical measurements.

      - company: Flatiron Institute, Simons Foundation
        position: Guest Researcher (External Collaborator)
        location: New York, NY
        start_date: 2019-08
        end_date: 2023-12
        highlights:
          - Performed DFT/DFPT and excited-state calculations (VASP, QE, Wannier90) on HPC for 2D and wide-bandgap materials.
          - Modeled excitons and electron-phonon coupling; interpreted PL/absorption and defect signatures.
          - "Built scalable HPC workflows for large-supercell and defect studies. Collaborator: Prof. Johannes Flick."

